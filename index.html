<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/custom.css">
        <title>Cornell Campus Tree Map</title>
    </head>
    <body>
        <div id="map"></div>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet.geocsv.js"></script>
        <script src="js/mustache-4.2.0.min.js"></script>
        <script src="js/leaflet-hash-plus.js"></script>
        <script>
        let csv_layer
        let query = ''
        let orighash = location.hash
        let map = L.map('map', {
            zoomControl:false, // we'll add it below, after the title
            maxZoom:21,
            minZoom:14
        })
        // default to view of Ag Quad
        map.setView([42.45, -76.48], 16)
        map.attributionControl.setPrefix('')

// also add layer switcher button like GRE localhost



        map.on('hashmetainit', function(state) {
            if (state.meta.length > 0) {
                query = state.meta[0]
            }
        })

        // add current extent to the URL hash
        let hash = new L.Hash(map)

        // add map title and description
        var title = new L.Control({'position':'topleft'})
        title.onAdd = function (map) {
            let div = L.DomUtil.create('div', 'info')
            div.innerHTML = `
                <h2>Cornell Campus Tree Map</h2>
                <p>This map is based on data from the <a target='_blank' href='https://cugir.library.cornell.edu/catalog/cugir-009100'>2019 Campus Tree Inventory</a>.</p>
                <p>Point colors indicate the genus of the tree.</p>
                <p>Search by species:
                    <input type='text' id='q' onchange='searchq()' />
                    <button onclick='clearq()'>reset</button>
                </p>
                <p id='summary'></p>
            `
            L.DomEvent.disableClickPropagation(div)
            return div
        }
        title.addTo(map)
        
        // add zoom controller
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map)

        // NYS imagery basemap
        var layer_nys_2023 = L.tileLayer.wms('https://orthos.its.ny.gov/arcgis/services/wms/2023/MapServer/WMSServer', {
            layers: '0',
            opacity: 0.7,
            attribution: 'Basemap imagery (2023) from <a href="https://gis.ny.gov/orthoimagery">New York State</a>',
            minZoom: 9,
            maxZoom: 21,
            minNativeZoom: 9,
            maxNativeZoom: 19
        }).addTo(map)

        // Positron basemap
        let layer_positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}' + (L.Browser.retina ? '@2x.png' : '.png'), {
            attribution:'&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20,
            minZoom: 0
        }).addTo(map)
    
/*
        map.createPane('pane_esri_imagery')
        map.getPane('pane_esri_imagery').style.zIndex = 400
        var layer_esri_imagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_esri_imagery',
            opacity: 1,
            attribution: 'Basemap imagery from <a href="https://arcgis.com/">Esri</a>',
            minZoom: 15,
            maxZoom: 21,
            minNativeZoom: 15,
            maxNativeZoom: 19
        })
        map.addLayer(layer_esri_imagery)
*/

        let layer_control = map.addControl(L.control.layers(
            {
                "NYS aerial photos": layer_nys_2023,
                "Positron": layer_positron
            }, null, {
                collapsed: false
            }
        ));

        // mustache template for the info displayed when hovering over a tree
        let trees_tooltip_template = `
          <h3>{{common}}</h3>
          <i>{{botanic}}</i><br>
          Trunk diameter: {{dbh}} inches<br> ({{yearinv}})
          `

        // define colors for the top 12 genus names
        let gcolor = {
            'acer':        '#a6cee3',
            'quercus':     '#1f78b4',
            'pinus':       '#b2df8a',
            'picea':       '#33a02c',
            'malus':       '#fb9a99',
            'cornus':      '#e31a1c',
            'amelanchier': '#fdbf6f',
            'cercis':      '#ff7f00',
            'gleditsia':   '#cab2d6',
            'platanus':    '#6a3d9a',
            'prunus':      '#ffff99',
            'thuja':       '#b15928'
        }

        function calcRadius(dbh) {
            // try to optimize point radius for different zoom levels
            let z = map.getZoom()
            dbh ||= 1  // in case dbh is not defined
            let r = 0.5 * Math.pow(dbh, 0.4) * Math.pow(2, (z - 15)*0.7)
            if (r < 2) {
                r = 2
            }
            return r
        }

        function style_trees(feature) {
            // default to gray if no color is defined for the genus name
            let genus = feature.properties['botanic'].split(' ')[0].toLowerCase()
            let c = gcolor[genus] || '#ccc'
            return {
                radius: calcRadius(feature.properties['dbh']),
                opacity: 1,
                color: '#000',
                fillColor: c,
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
            }
        }

        function loadCSV(url) {
            fetch(url).then((response) => {
                if (response.ok) response.text().then((csvtext) => {
                    // L.geoCsv won't see the last record without a final newline
                    csvtext += '\n'
                    csv_layer = L.geoCsv(csvtext, {
                        attribution: 'Tree data from <a href="https://cugir.library.cornell.edu/catalog/cugir-009100">CUGIR</a>',
                        minZoom: 19,
                        firstLineTitles: true,
                        fieldSeparator: ',',
                        longitudeTitle: 'longitude',
                        latitudeTitle: 'latitude',
                        pointToLayer: function(feature, latlng) {
                            let tooltip = Mustache.render(trees_tooltip_template, feature.properties)
                            return L.circleMarker(latlng, style_trees(feature))
                            .bindTooltip(tooltip, {
                                direction: 'top',
                                offset: L.point(0, -8),
                                opacity: 1.0
                            })
                            // highlight point on hover
                            .on('mouseover', function () {
                                this.setStyle({
                                    weight: 2
                                })
                            })
                            .on('mouseout', function () {
                                this.setStyle({
                                    weight: 0.5
                                })
                            })
                        }
                    })
                    map.on('zoomend', function() {
                        // thinner stroke when zoomed out, so we can still see the color
                        csv_layer.eachLayer((f) => {
                            f.setStyle({
                            radius: calcRadius(f.feature.properties['dbh'])
                            })
                        })
                    })
                    map.addLayer(csv_layer)
                    //map.setZoom(19)
                    
                    // check for query
                    if (orighash.match(/^#\w.*$/)) {
                        query = orighash.substr(1)
                    }
                    if (query) {
                        document.getElementById('q').value = decodeURIComponent(query).replace(/\+/g, ' ')
                        searchq()
                    }
                })
                else {
                    console.log('error loading csv data', response)
                }
            })
        }

        function searchq() {
            let qel = document.getElementById('q')
            let q = qel.value.trim()
            qel.value = q
            hash.setHashMeta([q.replace(/[^\w\s]+/g, '')])
            if (q.length > 0 || 1) {
                let count = 0
                csv_layer.eachLayer((f) => {
                    q = q.toLowerCase()
                    let p = f.feature.properties
                    let fulltext = [p.botanic, p.common].join(' ').toLowerCase()
                    if (fulltext.search(q) > -1) {
                        f.addTo(map)
                        count++
                    }
                    else {
                        f.remove()
                    }
                })
                document.getElementById('summary').innerHTML = `${count} trees` + (q ? ` matching '${q}'` : '')
            }
        }

        function clearq() {
            let inp = document.getElementById('q')
            inp.value = ''
            searchq()
            inp.focus()
        }

        loadCSV('data/trees-2019.csv')

        </script>
    </body>
</html>
